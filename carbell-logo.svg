<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- 외곽 원 -->
  <circle cx="50" cy="50" r="46" stroke="#0D4E8B" stroke-width="2.5" fill="none"/>

  <!-- 차량 아이콘 (상단) -->
  <g transform="translate(50, 38)" stroke="#0D4E8B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 차체 -->
    <path d="M-20,4 L-18,-2 L-12,-8 L12,-8 L18,-2 L20,4 L20,10 L-20,10 Z" fill="none"/>
    <!-- 유리창 -->
    <path d="M-10,-7 L-6,-14 L6,-14 L10,-7" fill="none"/>
    <!-- 바퀴 -->
    <circle cx="-12" cy="10" r="4" fill="#0D4E8B" opacity="0.3"/>
    <circle cx="12" cy="10" r="4" fill="#0D4E8B" opacity="0.3"/>
  </g>

  <!-- 렌치 아이콘 (하단) -->
  <g transform="translate(50, 68)" stroke="#0D4E8B" stroke-width="1.8" stroke-linecap="round">
    <!-- 렌치 좌 -->
    <path d="M-6,-6 L-2,-2 L2,-6" fill="none"/>
    <line x1="-2" y1="-2" x2="-2" y2="8"/>
    <!-- 렌치 우 -->
    <path d="M2,-6 L6,-2 L10,-6" fill="none"/>
    <line x1="6" y1="-2" x2="6" y2="8"/>
    <!-- X자 교차 -->
    <line x1="-4" y1="6" x2="8" y2="-4" opacity="0.3"/>
  </g>
</svg>
