<style>
:root {
  --black:  #0D0D0F;
  --navy:   #0C2550;
  --white:  #F5F5F7;
  --sub:    #555555;
  --border: #EBEBED;
  --ink:    #1A2540;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Pretendard',sans-serif; background:var(--white); padding:32px 20px 80px; color:var(--black); }
.wrap { max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
h2 { font-size:18px; font-weight:700; letter-spacing:-0.5px; color:var(--black); margin-bottom:2px; }
.sub { font-size:12px; color:#aaa; }
.stage { background:var(--white); padding:2px; border-radius:2px; display:flex; justify-content:center; overflow-x:auto; }

/* 앞면 명함 */
.bc {
  width:500px; height:280px; background:#fff; border-radius:2px;
  box-shadow:0 4px 15px rgba(0,0,0,0.06); padding:30px;
  display:flex; flex-direction:column; justify-content:space-between;
  border:1px solid var(--border); box-sizing:border-box; overflow:hidden;
  font-family:'Pretendard',sans-serif; flex-shrink:0;
}
.bc-logo {
  align-self:flex-end;
  margin-top:-4px; font-size:32px; line-height:1; letter-spacing:-0.8px; white-space:nowrap;
  display:flex; align-items:baseline;
}
.bc-logo { font-family:'Exo 2','Pretendard',sans-serif; }
.bc-logo .t { font-weight:300; color:var(--sub); font-family:'Exo 2','Pretendard',sans-serif; }
.bc-logo .b { font-weight:600; color:var(--black); margin-left:3px; font-family:'Exo 2','Pretendard',sans-serif; }
.bc-bottom { display:flex; flex-direction:column; }
.bc-user { display:flex; flex-direction:column; gap:1px; margin-bottom:10px; }
.bc-name { font-size:25px; font-weight:700; color:var(--ink); letter-spacing:5px; }
.bc-title { font-size:16px; font-weight:400; color:var(--sub); letter-spacing:0.3px; }
.bc-co-section { font-size:16px; line-height:1.45; color:var(--ink); font-weight:300; }
.bc-co-name { font-weight:600; font-size:17px; margin-bottom:4px; display:block; letter-spacing:-0.2px; }
.bc-detail { margin-top:2px; color:var(--sub); }
.bc-web { font-weight:700; font-size:16px; color:var(--ink); margin-top:4px; line-height:1; }

/* 뒷면 명함 */
.bc-back {
  width:500px; height:280px; background:linear-gradient(135deg, #0D0D0F 0%, #0f1a2e 40%, #142540 70%, #0D0D0F 100%); border-radius:2px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2); position:relative; overflow:hidden;
  flex-shrink:0;
}
.zodiac-label {
  position:absolute; top:18px; left:20px;
  font-family:'Pretendard',sans-serif; font-size:11px; font-weight:400;
  color:rgba(255,255,255,0.32); letter-spacing:3px; text-transform:uppercase;
}

/* 폼 */
.form { background:#fff; border-radius:16px; padding:24px; display:flex; flex-direction:column; gap:10px; box-shadow:0 2px 12px rgba(0,0,0,0.06); border:1px solid var(--border); }
.row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.input-group { display:flex; flex-direction:column; gap:3px; }
.input-group label { font-size:10px; font-weight:700; color:#aaa; letter-spacing:1px; text-transform:uppercase; }
.input-group input { padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:'Pretendard',sans-serif; color:var(--black); outline:none; transition:border-color 0.15s; }
.input-group input:focus { border-color:var(--navy); }
.btn-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:4px; }
.btn { width:100%; padding:13px; font-size:13px; font-weight:700; border:none; border-radius:10px; cursor:pointer; font-family:'Pretendard',sans-serif; transition:opacity 0.15s; }
.btn:hover { opacity:0.82; }
.btn-front { background:var(--black); color:#fff; }
.btn-back  { background:var(--black); color:#fff; }
.btn-pdf   { background:var(--navy); color:#fff; }
#toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#fff; padding:12px 24px; border-radius:30px; font-size:13px; font-weight:600; z-index:1000; display:none; }

/* 줌 컨트롤 */
.zoom-bar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; background:#fff; border:1px solid var(--border); border-radius:10px; padding:10px 14px; }
.zb-label { font-size:10px; font-weight:700; color:#aaa; letter-spacing:1px; text-transform:uppercase; margin-right:4px; }
.zb-btn { padding:5px 10px; border:1px solid var(--border); background:#fff; border-radius:6px; cursor:pointer; font-size:11px; font-weight:600; font-family:inherit; color:var(--black); transition:all 0.15s; }
.zb-btn:hover { border-color:#bbb; }
.zb-btn.active { background:var(--black); color:#fff; border-color:var(--black); }
.zb-slider { flex:1; min-width:100px; accent-color:var(--navy); }
.zb-value { font-weight:700; font-size:11px; color:var(--black); min-width:42px; text-align:right; }
.zb-size { color:#888; font-size:10px; letter-spacing:0.3px; width:100%; margin-top:2px; }

.zoom-box { width:calc(500px * var(--card-zoom, 1)); height:calc(280px * var(--card-zoom, 1)); position:relative; flex-shrink:0; transition:width 0.15s, height 0.15s; }
.zoom-box > .bc, .zoom-box > .bc-back { transform:scale(var(--card-zoom, 1)); transform-origin:top left; transition:transform 0.15s; }
</style>

function switchBrand(key) {
  const b = BRANDS[key];
  // 앞면 로고 (jpk: light+bold, fp/cb: bold+light)
  const logoEl = document.querySelector('.bc-logo');
  if (key === 'fp') {
    // freepass(bold) + mobility(light)
    logoEl.innerHTML = `<span class="b" style="color:${b.color}">${b.bold}</span><span class="t" style="color:${b.sub};margin-left:3px;">${b.light}</span>`;
  } else {
    // jpk: team(light) + jpk(bold) / cb: car(light) + bell(bold)
    logoEl.innerHTML = `<span class="t" style="color:${b.sub}">${b.light}</span><span class="b" style="color:${b.color};margin-left:3px;">${b.bold}</span>`;
  }
  // 앞면 회사정보
  document.querySelector('.bc-co-name').textContent = b.company;
  document.getElementById('v-addr').textContent = b.addr;
  document.querySelector('.bc-web').textContent = b.web;
  document.getElementById('v-email').textContent = b.email;
  document.getElementById('v-phone').textContent = b.phone;
  // 앞면 placeholder
  document.getElementById('i-email').placeholder = b.email;
  document.getElementById('i-addr').placeholder = b.addr;
  // 뒷면 로고
  const backLogo = document.querySelector('#back-card > div:last-child');
  if (backLogo) {
    if (key === 'fp') {
      backLogo.innerHTML = `<span style="font-weight:600;color:${b.darkBold};">${b.bold}</span><span style="font-weight:300;color:${b.darkLight};margin-left:3px;">${b.light}</span>`;
    } else {
      backLogo.innerHTML = `<span style="font-weight:300;color:${b.darkLight};">${b.light}</span><span style="font-weight:600;color:${b.darkBold};margin-left:3px;">${b.bold}</span>`;
    }
  }
  // 뒷면 배경 — 단색이 아니라 밤하늘 느낌 그라디언트
  if (b.backBg === '#0D0D0F') {
    document.getElementById('back-card').style.background = 'linear-gradient(135deg, #0D0D0F 0%, #0f1a2e 40%, #142540 70%, #0D0D0F 100%)';
  } else {
    document.getElementById('back-card').style.background = 'linear-gradient(135deg, #08101e 0%, #0D3060 35%, #0D4E8B 60%, #0a1a30 100%)';
  }
  // SVG nebula 색상
  const s1 = document.querySelector('#neb1 stop');
  const s2 = document.querySelector('#neb2 stop');
  if (b.backBg === '#0D0D0F') {
    if(s1) s1.setAttribute('stop-color', '#1a2a4a');
    if(s2) s2.setAttribute('stop-color', '#0a1830');
  } else {
    if(s1) s1.setAttribute('stop-color', '#1a3a6a');
    if(s2) s2.setAttribute('stop-color', '#0a2850');
  }
  // CSS 변수
  document.documentElement.style.setProperty('--navy', b.color);
}

function getZodiac(m, d) {
  if((m==3&&d>=21)||(m==4&&d<=19)) return 'aries';
  if((m==4&&d>=20)||(m==5&&d<=20)) return 'taurus';
  if((m==5&&d>=21)||(m==6&&d<=20)) return 'gemini';
  if((m==6&&d>=21)||(m==7&&d<=22)) return 'cancer';
  if((m==7&&d>=23)||(m==8&&d<=22)) return 'leo';
  if((m==8&&d>=23)||(m==9&&d<=22)) return 'virgo';
  if((m==9&&d>=23)||(m==10&&d<=22)) return 'libra';
  if((m==10&&d>=23)||(m==11&&d<=21)) return 'scorpio';
  if((m==11&&d>=22)||(m==12&&d<=21)) return 'sagittarius';
  if((m==12&&d>=22)||(m==1&&d<=19)) return 'capricorn';
  if((m==1&&d>=20)||(m==2&&d<=18)) return 'aquarius';
  return 'pisces';
}

let currentZodiacKey = null;

function startDrawScaled(z, scale) {
  const canvas = document.getElementById('zodiac-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 배경 별
  const pts = [
    [12,8,0.6,0.4],[38,22,0.5,0.3],[72,6,0.7,0.5],[95,18,0.5,0.35],[130,11,0.6,0.45],
    [168,5,0.5,0.3],[205,14,0.7,0.4],[248,8,0.5,0.5],[285,19,0.6,0.35],[318,7,0.5,0.4],
    [355,15,0.8,0.5],[392,4,0.5,0.3],[428,20,0.6,0.45],[462,9,0.5,0.4],[490,25,0.6,0.35],
    [25,45,0.5,0.3],[58,38,0.7,0.4],[112,42,0.5,0.45],[178,35,0.6,0.35],[215,48,0.5,0.4],
    [265,38,0.7,0.5],[308,44,0.5,0.3],[345,36,0.6,0.45],[405,42,0.5,0.35],[448,35,0.7,0.4],
    [18,68,0.6,0.4],[48,75,0.5,0.35],[88,62,0.7,0.45],[188,65,0.6,0.4],[232,72,0.5,0.5],
    [272,60,0.7,0.35],[368,62,0.6,0.4],[415,74,0.5,0.3],[465,65,0.7,0.45],[8,98,0.6,0.4],
    [42,105,0.5,0.3],[78,92,0.7,0.45],[118,100,0.5,0.4],[198,98,0.5,0.5],[285,95,0.5,0.45],
    [372,92,0.5,0.35],[418,105,0.7,0.4],[460,95,0.5,0.3],[22,128,0.5,0.35],[62,135,0.7,0.4],
    [182,118,0.5,0.4],[222,132,0.7,0.35],[382,130,0.7,0.4],[425,118,0.5,0.35],[465,128,0.6,0.4],
    [52,165,0.7,0.45],[175,148,0.5,0.5],[375,152,0.7,0.4],[418,162,0.5,0.3],[458,155,0.6,0.45],
    [28,188,0.7,0.4],[68,195,0.5,0.3],[428,192,0.6,0.4],[468,185,0.5,0.3],
    [55,225,0.5,0.4],[412,222,0.7,0.45],[452,215,0.5,0.35],[485,228,0.6,0.4],
    [75,260,0.7,0.45],[398,248,0.7,0.4],[438,258,0.5,0.3],[478,272,0.6,0.45]
  ];
  ctx.shadowBlur = 0;
  pts.forEach(([x,y,r,o]) => {
    ctx.fillStyle = `rgba(255,255,255,${o})`;
    ctx.beginPath();
    ctx.arc(x*scale, y*scale, r*scale, 0, Math.PI*2);
    ctx.fill();
  });

  if (!z) return;

  const cx = 250*scale, cy = 135*scale;
  const zs = 1.75;
  const sx = x => cx + (x - 250) * zs * scale;
  const sy = y => cy + (y - 135) * zs * scale;

  // 연결선
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 1.2 * scale;
  z.lines.forEach(([a,b]) => {
    ctx.beginPath();
    ctx.moveTo(sx(z.stars[a][0]), sy(z.stars[a][1]));
    ctx.lineTo(sx(z.stars[b][0]), sy(z.stars[b][1]));
    ctx.stroke();
  });

  // 일반 별
  z.stars.forEach((s,i) => {
    if (z.bright.includes(i)) return;
    ctx.shadowBlur = 6 * scale;
    ctx.shadowColor = 'white';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(sx(s[0]), sy(s[1]), 1.6*scale, 0, Math.PI*2);
    ctx.fill();
  });

  // 밝은 별
  z.bright.forEach(i => {
    const x = sx(z.stars[i][0]), y = sy(z.stars[i][1]);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.arc(x, y, 9*scale, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 22*scale; ctx.shadowColor = 'rgba(200,220,255,1)';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(x, y, 4.5*scale, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 10*scale; ctx.shadowColor = 'white';
    ctx.fillStyle = 'rgba(255,255,255,0.98)';
    ctx.beginPath(); ctx.arc(x, y, 2.2*scale, 0, Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur = 0;
}

function startDraw(z) {
  const canvas = document.getElementById('zodiac-canvas');
  canvas.width = 500; canvas.height = 280;
  startDrawScaled(z, 1);
}

async function captureBack(scale) {
  const canvas = document.getElementById('zodiac-canvas');
  canvas.width = 500 * scale;
  canvas.height = 280 * scale;
  const z = currentZodiacKey ? ZODIAC[currentZodiacKey] : null;
  startDrawScaled(z, scale);
  const result = await html2canvas(document.getElementById('back-card'), {
    scale: scale, useCORS: true, logging: false, backgroundColor: '#0D0D0F',
    width: 500, height: 280
  });
  canvas.width = 500; canvas.height = 280;
  if (z) startDrawScaled(z, 1);
  return result;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || '저장되었습니다!';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// 줌 컨트롤 초기화
function initZoom() {
  document.querySelectorAll('.stage').forEach(stage => {
    const card = stage.querySelector('.bc, .bc-back');
    if (!card || card.parentElement.classList.contains('zoom-box')) return;
    const wrap = document.createElement('div');
    wrap.className = 'zoom-box';
    card.parentNode.insertBefore(wrap, card);
    wrap.appendChild(card);
  });
  const slider = document.getElementById('zoom-slider');
  const valueEl = document.getElementById('zoom-value');
  const buttons = document.querySelectorAll('.zb-btn');
  function setZoom(z) {
    document.documentElement.style.setProperty('--card-zoom', z);
    valueEl.textContent = Math.round(z * 100) + '%';
    slider.value = Math.round(z * 100);
    buttons.forEach(b => b.classList.toggle('active', Math.abs(parseFloat(b.dataset.zoom) - z) < 0.005));
  }
  slider.addEventListener('input', () => setZoom(slider.value / 100));
  buttons.forEach(b => b.addEventListener('click', () => setZoom(parseFloat(b.dataset.zoom))));
}

// 캡처 직전 줌을 1로 리셋 (복구 함수 반환)
async function resetZoomForCapture() {
  const root = document.documentElement;
  const prev = root.style.getPropertyValue('--card-zoom') || '1';
  root.style.setProperty('--card-zoom', '1');
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  return () => root.style.setProperty('--card-zoom', prev);
}

window.addEventListener('DOMContentLoaded', function() {
  initZoom();
  // 앞면 실시간 반영
  const map = {
    'i-name':  ['v-name',  '성함'],
    'i-title': ['v-title', '직함'],
    'i-phone': ['v-phone', '010-0000-0000'],
    'i-email': ['v-email', 'contact@teamjpk.com'],
    'i-addr':  ['v-addr',  '경기도 김포시 아라육로152번길 45, 국민차매매단지 229호']
  };
  Object.keys(map).forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      document.getElementById(map[id][0]).innerText = this.value || map[id][1];
    });
  });

  // 입사일 → 별자리
  document.getElementById('i-birth').addEventListener('input', function() {
    if (!this.value) return;
    const d = new Date(this.value);
    const key = getZodiac(d.getMonth()+1, d.getDate());
    currentZodiacKey = key;
    const z = ZODIAC[key];
    document.getElementById('zodiac-label').textContent = z.name + ' · ' + z.en;
    document.getElementById('zodiac-title').textContent = z.name + ' ✦';
    const yr = d.getFullYear();
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const dy = String(d.getDate()).padStart(2,'0');
    document.getElementById('hire-date-label').textContent = yr + '. ' + mo + '. ' + dy;
    startDraw(z);
  });

  const frontEl = document.querySelector('.bc');
  const backEl  = document.getElementById('back-card');

  // PNG 저장
  async function dlPNG(el, bgColor, filename) {
    await document.fonts.ready;
    const name = document.getElementById('i-name').value || '성함';
    const restore = await resetZoomForCapture();
    try {
      let captured;
      if (bgColor === '#0D0D0F') {
        captured = await captureBack(2);
      } else {
        captured = await html2canvas(el, {
          scale: 2, useCORS: true, logging: false,
          backgroundColor: bgColor, width: 500, height: 280
        });
      }
      const a = document.createElement('a');
      a.download = `teamjpk_${filename}_${name}.png`;
      a.href = captured.toDataURL('image/png', 1.0);
      a.click();
      showToast(`${filename} PNG 저장 완료!`);
    } finally {
      restore();
    }
  }

  document.getElementById('btn-front').addEventListener('click', () => dlPNG(frontEl, '#ffffff', '앞면'));
  document.getElementById('btn-back').addEventListener('click',  () => dlPNG(backEl, '#0D0D0F', '뒷면'));

  // PDF 저장 (재단선 포함)
  document.getElementById('btn-pdf').addEventListener('click', async function() {
    await document.fonts.ready;
    const name = document.getElementById('i-name').value || '성함';
    const { jsPDF } = window.jspdf;

    const CW = 90, CH = 90 * 280 / 500; // 90 × 50.4mm
    const gap = 2, lineLen = 5, margin = gap + lineLen;
    const PW = CW + margin * 2, PH = CH + margin * 2;
    const ox = margin, oy = margin;

    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [PW, PH] });

    function drawCropMarks(pdf, ox, oy, cw, ch) {
      pdf.setDrawColor(255, 0, 0);
      pdf.setLineWidth(0.1);
      [[ox, oy], [ox+cw, oy], [ox, oy+ch], [ox+cw, oy+ch]].forEach(([cx, cy]) => {
        const dx = cx === ox ? -1 : 1;
        const dy = cy === oy ? -1 : 1;
        pdf.line(cx + dx*gap, cy, cx + dx*(gap+lineLen), cy);
        pdf.line(cx, cy + dy*gap, cx, cy + dy*(gap+lineLen));
      });
    }

    showToast('PDF 생성 중... 잠시만요');
    const restore = await resetZoomForCapture();
    try {
      // 앞면
      const frontCanvas = await html2canvas(frontEl, {
        scale: 15, useCORS: true, logging: false,
        backgroundColor: '#ffffff', width: 500, height: 280
      });
      pdf.addImage(frontCanvas.toDataURL('image/png', 1.0), 'PNG', ox, oy, CW, CH, undefined, 'NONE');
      drawCropMarks(pdf, ox, oy, CW, CH);

      // 뒷면
      pdf.addPage([PW, PH], 'landscape');
      const backCanvas = await captureBack(15);
      pdf.addImage(backCanvas.toDataURL('image/png', 1.0), 'PNG', ox, oy, CW, CH, undefined, 'NONE');
      drawCropMarks(pdf, ox, oy, CW, CH);

      const brandKey = document.getElementById('brand-select').value;
      const brandName = BRANDS[brandKey].bold + (BRANDS[brandKey].light || '');
      pdf.save(`${brandName}_명함_${name}.pdf`);
      showToast('PDF 저장 완료! (재단선 포함, 앞+뒷면)');
    } finally {
      restore();
    }
  });
});
